<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Recipe Box" />
  <title>Recipe Box</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">&#127859;</span>
          <h1>Recipe Box</h1>
        </div>
        <div class="header-stats">
          <span id="stat-want">0 to try</span>
          <span class="stat-divider">·</span>
          <span id="stat-tried">0 tried</span>
        </div>
      </div>
    </header>

    <main class="main">

      <!-- Add Recipe Section -->
      <section class="add-section">
        <div class="add-card">
          <p class="add-label">Add a recipe</p>
          <div class="add-link-row">
            <input
              type="url"
              id="url-input"
              class="url-input"
              placeholder="Paste an Instagram or TikTok link..."
              autocomplete="off"
              autocorrect="off"
              autocapitalize="off"
            />
            <button class="btn-save" id="save-link-btn" onclick="saveFromLink()">Save</button>
          </div>
          <div class="add-divider">
            <span>or</span>
          </div>
          <label class="btn-upload" for="screenshot-input">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Upload a screenshot
            <input type="file" id="screenshot-input" accept="image/*" style="display:none" onchange="saveFromScreenshot(this)" />
          </label>
        </div>
      </section>

      <!-- Filter Tabs -->
      <section class="filter-section">
        <div class="filter-tabs">
          <button class="tab active" data-filter="all" onclick="setFilter('all', this)">All</button>
          <button class="tab" data-filter="want" onclick="setFilter('want', this)">Want to try</button>
          <button class="tab" data-filter="tried" onclick="setFilter('tried', this)">Tried it</button>
        </div>
      </section>

      <!-- Recipe Grid -->
      <section class="recipes-section">
        <div class="recipe-grid" id="recipe-grid"></div>
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">&#127859;</div>
          <p>No recipes here yet.</p>
          <p class="empty-sub">Paste a link above to get started!</p>
        </div>
      </section>

    </main>

  </div>

  <!-- Recipe Detail Panel -->
  <div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
    <div class="detail-panel">
      <div class="detail-header">
        <button class="btn-back" onclick="closeDetail()">← Back</button>
        <div class="header-edit-controls">
          <button class="btn-edit-toggle" id="btn-edit-toggle" onclick="toggleEditMode()">Edit</button>
          <button class="btn-header-save" id="btn-header-save" onclick="saveEdit()" style="display:none">Save</button>
        </div>
      </div>
      <div class="detail-content" id="detail-content"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
